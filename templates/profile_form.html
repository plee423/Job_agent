<!doctype html>
<html>
  <body>
    <h1>Create Profile</h1>
    <form action="/profiles" method="post">
      <label>Name <input name="name" required /></label><br />
      <label>LinkedIn URL <input name="linkedin_url" required /></label><br />
      <label>Resume text</label><br />
      <textarea name="resume_text" rows="12" cols="80" required></textarea><br />
      <label>Extra experience stories (freeform, comma-separated keywords optional)</label><br />
      <textarea name="extra_experience" rows="8" cols="80"></textarea><br />
      <button type="submit">Save profile</button>
    </form>
    <a href="/">Back</a>
  </body>
</html>
